watch_stylesheet: true
watch_config: true
debug: false
update_check: true
bars:
  primary-bar:
    enabled: true
    screens: ["primary"]
    class_name: "yasb-bar"
    alignment:
      position: "top"
      center: false
    animation:
      enabled: true
      duration: 400
    blur_effect:
      enabled: true
      acrylic: false
      dark_mode: false
      round_corners: false
      round_corners_type: "normal"
      border_color: "system"
    window_flags:
      always_on_top: false
      windows_app_bar: true
    dimensions:
      width: "100%"
      height: 32
    padding:
      top: 0
      left: 0
      bottom: 0
      right: 0
    widgets:
      left:
      - "home"
      - "quick_launch"
      center:
      - "clock"
      right:
      - "systray"
      - "cpu"
      - "memory"
      - "open_meteo"
      - "volume"
      - "notifications"
      - "power_menu"
widgets:
  home:
    type: "yasb.home.HomeWidget"
    options:
      label: "<span>\ue700</span>"
      menu_list:
      - { title: "User Home", path: "~" }
      - { title: "Download", path: "~\\Downloads" }
      - { title: "Documents", path: "~\\Documents" }
      - { title: "Pictures", path: "~\\Pictures" }
      system_menu: true
      power_menu: true
      blur: true
      round_corners: true
      round_corners_type: "normal"
      border_color: "System"
      alignment: "center"
  quick_launch:
    type: "yasb.quick_launch.QuickLaunchWidget"
    options:
      label: "<span>\ue721</span>"
      search_placeholder: "Search applications..."
      max_results: 30
      show_icons: true
      icon_size: 16
      compact_text: true
      providers:
        apps:
          enabled: true
          prefix: "*"
          priority: 0
          show_recent: true
          max_recent: 5
          show_description: true
      popup:
        width: 720
        height: 480
        blur: true
        round_corners: true
        round_corners_type: "normal"
        border_color: "system"
        dark_mode: true
      callbacks:
        on_left: "toggle_quick_launch"
      keybindings:
        - keys: "alt+space"
          action: "toggle_quick_launch"
          screen: "primary"
  clock:
    type: "yasb.clock.ClockWidget"
    options:
      label: "{%a, %d %b %H:%M}"
      label_alt: "{%A, %d %B %Y %H:%M}"
      timezones: []
      calendar: 
        blur: true
        round_corners: true
        alignment: "center"
        direction: "down"
        extended: false
        show_years: true
        show_holidays: false
        show_week_numbers: true
      callbacks:
        on_left: "toggle_calendar"
        on_middle: "toggle_label"
        on_right: "context_menu"
  systray:
    type: yasb.systray.SystrayWidget
    options:
      class_name: systray
      label_collapsed: "\ue70d"
      label_expanded: "\ue70e"
      label_position: right
      pin_click_modifier: ctrl
      show_unpinned: false
      show_battery: false
      show_volume: false 
      icon_size: 16
      use_hook: true
      show_in_popup: true
      icons_per_row: 5
      popup:
        blur: true
        round_corners: true
        round_corners_type: "normal"
        border_color: None
        alignment: "center"
        direction: "down"
        offset_top: 6
        offset_left: 0
  open_meteo:
    type: "yasb.open_meteo.OpenMeteoWidget"
    options:
      label: "<span>\ue706</span>{temp}"
      label_alt: "{location}: Min {min_temp}, Max {max_temp}, Humidity {humidity}"
      tooltip: true
      update_interval: 600
      hide_decimal: true
      units: "metric"
      callbacks:
        on_left: "toggle_card"
        on_middle: "do_nothing"
        on_right: "toggle_label"
      icons:
        sunnyDay: "\ue706"
        clearNight: "\uec46"
      weather_card:
        blur: true
        alignment: "right"
        direction: "down"
        icon_size: 32
        show_hourly_forecast: true
        time_format: "24h"
        hourly_point_spacing: 76
        hourly_icon_size: 16
        icon_smoothing: true
        temp_line_width: 2
        current_line_color: "#8EAEE8"
        current_line_width: 1
        current_line_style: "dot"
        hourly_forecast_buttons:
          enabled: false
        weather_animation:
          enabled: true
          snow_overrides_rain: true
          temp_line_animation_style: both
          rain_effect_intensity: 1.0
          snow_effect_intensity: 1.0
          scale_with_chance: true
  volume:
    type: "yasb.volume.VolumeWidget"
    options:
      label: "<span>{icon}</span>"
      label_alt: "<span>{icon}</span>{level}"
      tooltip: true
      volume_icons:
        - "\ue74f"
        - "\ue992"
        - "\ue993"
        - "\ue994"
        - "\ue995"
      callbacks:
        on_left: "toggle_volume_menu"
        on_right: "toggle_mute"
  cpu:
    type: "yasb.cpu.CpuWidget"
    options:
      label: "<span>\ueea1</span> {info[percent][total]}%"
      label_alt: "<span>\ueea1</span> {info[freq][current]} MHz"
      update_interval: 2000
      menu:
        enabled: true
        show_graph: true
        show_graph_grid: true
        graph_history_size: 60
      callbacks:
        on_left: toggle_menu
        on_middle: do_nothing
        on_right: toggle_label
  memory:
    type: "yasb.memory.MemoryWidget"
    options:
      label: "<span>\ueea1</span> {virtual_mem_free}"
      label_alt: "<span>\ueea1</span> VIRT: {virtual_mem_percent}% SWAP: {swap_mem_percent}%"
      update_interval: 5000
      callbacks:
        on_left: "toggle_menu"
        on_middle: "do_nothing"
        on_right: "toggle_label"
      menu:
        enabled: true
        show_graph: true
        show_graph_grid: true
        graph_history_size: 60
  power_menu:
    type: "yasb.power_menu.PowerMenuWidget"
    options:
      label: "<span>\ue712</span>"
      uptime: true
      show_user: true
      menu_style: "popup"
      popup:
        blur: true
        round_corners: true
        round_corners_type: "normal"
        border_color: "System"
        alignment: "right"
        direction: "down"
        offset_top: 6
        offset_left: 0
      profile_image_size: 64
      buttons:
        lock: ["\ue72e", "Lock"]
        signout: ["\uf3b1", "Sign out"]
        sleep: ["\uec46", "Sleep"]
        hibernate: ["\ue66d", "Hibernate"]
        restart: ["\ue72c", "Restart"]
        shutdown: ["\ue7e8", "Shut Down"]
        cancel: ["", "Cancel"]
  notifications:
    type: "yasb.notifications.NotificationsWidget"
    options:
      label: "<span>\uf2a3</span>"
      label_alt: "{count} notifications"
      hide_empty: true
      tooltip: false
      callbacks:
        on_left: "toggle_notification"
        on_right: "do_nothing"
        on_middle: "do_nothing"
