# yaml-language-server: $schema=https://raw.githubusercontent.com/amnweb/yasb/main/schema.json
# For more information, visit https://github.com/amnweb/yasb/wiki
watch_stylesheet: true
watch_config: true
debug: false
update_check: true
bars:
  primary-bar:
    enabled: true
    screens:
    - '*'
    class_name: yasb-bar
    alignment:
      position: bottom
      align: center
    animation:
      enabled: true
      duration: 300
    blur_effect:
      enabled: false
      round_corners: true
    window_flags:
      always_on_top: false
      windows_app_bar: true
    dimensions:
      width: 100%
      height: 36
    padding:
      top: 0
      left: 0
      bottom: 0
      right: 0
    widgets:
      left:
      - home
      - lines
      - komorebi_workspaces
      - lines
      - komorebi_active_layout
      - lines
      - taskbar
      right:
      - media
      - lines
      - volume
      - lines
      - clock
      - lines
      - language
      - lines
      - quick_launch
      - lines
      - systray
      - wallpapers
      - notifications
      - power_menu
widgets:
  home:
    type: yasb.home.HomeWidget
    options:
      direction: up
      label: "<span>家</span>"
      menu_list:
      - title: User Home
        path: '~'
      - title: Download
        path: ~\Downloads
      - title: Documents
        path: ~\Documents
      - title: Pictures
        path: ~\Pictures
      system_menu: true
      power_menu: false
      blur: false
      round_corners: true
      round_corners_type: normal
      border_color: System
      alignment: left
      offset_left: -12
  clock:
    type: yasb.clock.ClockWidget
    options:
      label: '{%a, %d %b %H:%M}<span>{alarm}</span>'
      label_alt: '{%a, %d %b %H:%M}'
      timezones: []
      calendar:
        blur: false
        round_corners: true
        alignment: center
        direction: up
        extended: false
        show_years: true
        show_holidays: false
        show_week_numbers: true
      callbacks:
        on_left: toggle_calendar
  volume:
    type: yasb.volume.VolumeWidget
    options:
      label: "<span>{icon}</span> {level}"
      label_alt: "{level}"
      tooltip: true
      icons:
        "muted": "\uf026" # Icon for muted
        "10": "\uf026"  # Icon for 0-10% volume
        "30": "\uf026"  # Icon for 11-30% volume
        "60": "\uf026"  # Icon for 31-60% volume
        "100": "\uf026" # Icon for 61-100% volume
      callbacks:
        on_left: toggle_volume_menu
        on_right: toggle_mute
      audio_menu:
        blur: false
        round_corners: true
        round_corners_type: normal
        border_color: system
        alignment: right
        direction: up
        show_apps: true
        show_app_labels: true
        show_app_icons: true
        show_apps_expanded: false
        app_icons:
          toggle_down: "\uf106"
          toggle_up: "\uf107"
  notifications:
    type: yasb.notifications.NotificationsWidget
    options:
      label: "<span>\ueb9a</span>"
      label_alt: '{count} notifications'
      hide_empty: true
      tooltip: false
      callbacks:
        on_left: toggle_notification
        on_right: do_nothing
        on_middle: do_nothing
  power_menu:
    type: yasb.power_menu.PowerMenuWidget
    options:
      label: "<span>\ueaf8</span>"
      uptime: true
      show_user: true
      menu_style: popup
      popup:
        blur: false
        direction: up
        round_corners: true
        round_corners_type: normal
        border_color: System
        alignment: right
        offset_left: 12
      profile_image_size: 64
      buttons:
        lock:
        - "\uDB80\uDF41"
        - Lock
        signout:
        - "\uDB80\uDF43"
        - Sign out
        sleep:
        - "\uDB82\uDD04"
        - Sleep
        hibernate:
        - "\uDB82\uDD01"
        - Hibernate
        restart:
        - "\uDB81\uDC53"
        - Restart
        shutdown:
        - "\uDB82\uDD06"
        - Shut Down
        cancel:
        - ''
        - Cancel
  active_window:
    type: yasb.active_window.ActiveWindowWidget
    options:
      label: '{win[title]}'
      label_alt: '{win[title]}'
      label_no_window: ''
      label_icon: true
      label_icon_size: 16
      max_length: 32
      max_length_ellipsis: '...'
      monitor_exclusive: false
  win_button:
      type: "yasb.custom.CustomWidget"
      options:
        label: "家"
        label_alt: "家"
        class_name: "system-widget"
        callbacks:
          on_left: "exec start_menu"
  lines:
    type: "yasb.custom.CustomWidget"
    options:
      label: "\u007c"
      label_alt: "\u007c"
      class_name: "separator-widget"
      callbacks:
        on_left: "do_nothing"
  komorebi_workspaces:
    type: "komorebi.workspaces.WorkspaceWidget"
    options:
      label_offline: "Komorebi Offline"
      label_workspace_btn: "{index}"
      label_workspace_active_btn: "{index}"
      label_workspace_populated_btn: "{index}"
      label_default_name: ""
      label_zero_index: false
      hide_empty_workspaces: true
      hide_if_offline: false
      toggle_workspace_layer:
        enabled: false
        tiling_label: "Tiling"
        floating_label: "Floating"
      app_icons: 
        enabled_populated: false
        enabled_active: false
        size: 12
        max_icons: 0
        hide_label: false
        hide_duplicates: false
        hide_floating: false
  komorebi_active_layout:
    type: "komorebi.active_layout.ActiveLayoutWidget"
    options:
      hide_if_offline: true
      label: "{layout_name}"
      layouts: ['bsp', 'columns', 'rows', 'grid', 'vertical_stack', 'horizontal_stack', 'ultrawide_vertical_stack','right_main_vertical_stack']
      layout_icons:
        bsp: "\uebeb"
        columns: "\uebf7"
        rows: "\uec01"
        grid: "\udb81\udf58"
        scrolling: "\uebf7"
        vertical_stack: "\uebee"
        horizontal_stack: "\uebf0"
        ultrawide_vertical_stack: "\uebee"
        right_main_vertical_stack: "\uebf1"
        monocle: "\uf06f"
        maximized: "\uf06f"
        floating: "\uf2d2"
        paused: "\udb83\udf89"
        tiling: "\udb81\ude40"
      callbacks:
        on_left: 'toggle_layout_menu'
        on_middle: 'next_layout'
        on_right: 'prev_layout'
      layout_menu:
        blur: false
        round_corners: true
        round_corners_type: "normal"
        border_color: "System"
        alignment: "left"
        direction: "up"
        offset_top: 6
        offset_left: 0
        show_layout_icons: true
  cava:
    type: "yasb.cava.CavaWidget"
    options:
      bar_height: 12
      waveform: 0
      waves: 0
      monstercat: 0
      sensitivity: 100
      edge_fade: 1
      min_bar_height: 0
      gradient: 0
      foreground: "#cad3f5"
      bars_number: 10
      bar_spacing: 2
      bar_width: 4
      bar_type: "bars"
      framerate: 60
  systray:
    type: "yasb.systray.SystrayWidget"
    options:
      class_name: "systray"
      label_collapsed: "\uf106"
      label_expanded: "\uf107"
      label_position: "left" # Can be "left" or "right"
      icon_size: 16 # Can be any integer between 8 and 64
      pin_click_modifier: "alt" # Can be "ctrl", "alt" or "shift"
      show_unpinned: false
      show_unpinned_button: true
      show_battery: false
      show_in_popup: 1
      show_volume: false
      show_network: true
      use_hook: true
      icons_per_row: 3
      show_network: false
      use_hook: false # Whether to use the new systray hook instead of the legacy systray monitor
      hide_icons: [] # Optional, list of process names to hide (e.g. ["discord"])
      popup:
        blur: false
        round_corners: true
        round_corners_type: "normal"
        border_color: None
        alignment: "center"
        direction: "up"
        offset_top: 6
        offset_left: 0
  wallpapers:
    type: "yasb.wallpapers.WallpapersWidget"
    options:
      label: "<span>\udb83\ude09</span>"
    # Example path to folder with images. Can be a single string or a list of strings.
    # image_path: "C:\\Users\\{Username}\\Images" 
      image_path: 
        - "D:\\OneDrive\\Pictures\\Wallpapers\\Themes\\Catppuccin"
      change_automatically: false # Automatically change wallpaper
      update_interval: 60 # If change_automatically is true, update interval in seconds
      engine:
        enabled: true
        animation: "diamond" # circle/slide_top/diamond/split
      gallery:
        enabled: true
        blur: false
        image_width: 350
        image_per_page: 6
        gallery_columns: 0 # 0 = auto, matches image_per_page for a single row
        horizontal_position: "center" # left/center/right placement on screen
        vertical_position: "center" # top/center/bottom placement
        position_offset: 0 # minimum gap (px) from screen edges - see below for advanced options
        respect_work_area: true # clamp to OS work area (avoids Windows taskbar)
        show_buttons: false
        orientation: "landscape"
        image_spacing: 8
        lazy_load: true
        lazy_load_fadein: 400
        image_corner_radius: 0
      callbacks:
        on_left: "toggle_gallery"
        on_middle: "do_nothing"
        on_right: "change_wallpaper"
  media:
    type: "yasb.media.MediaWidget"
    options:
      label: "{title}{s}{artist}"
      label_alt: "{title}{s}{artist}"
      separator: " - "
      hide_empty: true
      callbacks:
        on_left: "toggle_media_menu"
        on_middle: "do_nothing"
        on_right: "do_nothing"
      max_field_size:
        label: 45
        label_alt: 30
      show_thumbnail: false
      controls_only: false
      controls_left: true
      controls_hide: true
      thumbnail_alpha: 80
      thumbnail_padding: 8
      thumbnail_corner_radius: 16
      icons:
        prev_track: "\ue892"
        next_track: "\ue893"
        play: "\ue768"
        pause: "\ue769"
      media_menu:
        blur: false
        round_corners: false
        round_corners_type: "normal"
        border_color: "system"
        alignment: "right"
        direction: "up"
        offset_top: 6
        offset_left: 0
        thumbnail_corner_radius: 0
        thumbnail_size: 120
        max_title_size: 60
        max_artist_size: 50
        show_source: true
      media_menu_icons:
        play: "\udb81\udc0a"
        pause: "\udb80\udfe4"
        prev_track: "\udb81\udcae"
        next_track: "\udb81\udcad"
      scrolling_label:
        enabled: false
        update_interval_ms: 33
        style: "left"  # can be "left", "right", "bounce", "bounce-ease"
        separator: " | "
        label_padding: 0
        always_scroll: false
      # Easing curve params: https://www.desmos.com/calculator/j7eamemxzi
        ease_slope: 20
        ease_pos: 0.8
        ease_min: 0.5
      progress_bar:
        enabled: false       # Whether to enable the progress bar on the widget.
        alignment: "bottom"  # The alignment of the progress bar inside the widget container. Can be "top", "bottom", or "center".
  language:
    type: "yasb.language.LanguageWidget"
    options:
      label: "{lang[language_code]}"
      label_alt: "{lang[full_name]}"
      update_interval: 1
      callbacks:
        on_left: "toggle_menu"
        on_middle: "do_nothing"
        on_right: "toggle_label"
      language_menu:
        blur: false
        round_corners: true
        round_corners_type: "normal"
        border_color: "system"
        alignment: "right"
        direction: "up"
        offset_top: 6
        offset_left: 0
        show_layout_icon: true
        layout_icon: "\udb80\udf0c"
  quick_launch:
    type: "yasb.quick_launch.QuickLaunchWidget"
    options:
      label: "<span>\uf002</span>"
      search_placeholder: "Search applications..."
      max_results: 30
      show_icons: true
      icon_size: 32
      popup:
        width: 650
        height: 400
        blur: false
        round_corners: true
        round_corners_type: "normal"
        border_color: "system"
        dark_mode: true
      callbacks:
        on_left: "toggle_quick_launch"
      keybindings:
        - keys: "alt+space"
          action: "toggle_quick_launch"
          screen: "primary"
  lines:
    type: "yasb.custom.CustomWidget"
    options:
      label: "\u007c"
      label_alt: "\u007c"
      class_name: "separator-widget"
      callbacks:
        on_left: "do_nothing"
  taskbar:
    type: "yasb.taskbar.TaskbarWidget"
    options:
      icon_size: 0
      tooltip: true
      show_only_visible: true
      strict_filtering: true
      monitor_exclusive: true
      animation:
        enabled: true
        duration: 200
      preview:
        enabled: true
        width: 240
        delay: 400
        padding: 8
        margin: 8
      title_label:
        enabled: true
        show: "always"
        min_length: 10
        max_length: 30
      ignore_apps:
        processes: []
        titles: []
        classes: []
