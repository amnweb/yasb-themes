# To center the contents of the bar exactly in the center, use: go to the style.css
watch_stylesheet: True
watch_config: True
debug: False
bars:
  dots-windows:
    enabled: True
    screens: ["*"]
    class_name: "yasb-bar"
    alignment:
      position: "top"
      align: "left"
    animation:
      enabled: True
      duration: 1000
    blur_effect:
      enabled: True
    window_flags:
      windows_app_bar: True
    dimensions:
      width: "100%"
      height: 40
    layouts:
      left:
        alignment: "left"
        stretch: True
      center:
        alignment: "center"
        stretch: True
      right:
        alignment: "right"
        stretch: True
    widgets:
      left: [
        "power_menu",
        "active_window"
      ]
      center: [
        "info-grouper",
        "taskbar",
        #"windows_workspaces",
        "clock-grouper"
      ]
      right: [
        "wallpapers",
        "right-grouper"
        ]
widgets:
  info-grouper:
    type: "yasb.grouper.GrouperWidget"
    options:
      class_name: "info-grouper"
      widgets: [
        "cpu",
        "memory",
        "traffic",
        "media"
      ]
  clock-grouper:
    type: "yasb.grouper.GrouperWidget"
    options:
      class_name: "clock-grouper"
      widgets: [
        "clock",
        "screenshot",
        "showkeyboard",
        "brightness",
        "battery",
        "open_meteo"
      ]
  right-grouper:
    type: "yasb.grouper.GrouperWidget"
    options:
      class_name: "right-grouper"
      widgets: [
        "language",
        "dotseparator",
        "notifications",
        "control-center"
      ]
  control-center:
    type: "yasb.grouper.GrouperWidget"
    options:
      class_name: "control-center"
      widgets: [
        "wifi",
        "bluetooth"
      ]
  active_window:
    type: "yasb.active_window.ActiveWindowWidget"
    options:
      label: " {win[app_name]}"
      label_no_window: "Workspace"
      label_icon: True
      label_icon_size: 18
      max_length: 30
      max_length_ellipsis: "..."
      monitor_exclusive: True
      callbacks:
        on_left: "do_nothing"
        on_middle: "do_nothing"
        on_right: "do_nothing"
  cpu:
    type: "yasb.cpu.CpuWidget"
    options:
      label: "{info[percent][total]}"
      update_interval: 2000
      progress_bar:
        enabled: True
        position: 'left'
        size: 24
        thickness: 10
        color: '#d2e5f4'
        animation: True
      callbacks:
        on_right: "exec cmd /c Taskmgr"
        on_left: "toggle_menu"
        on_middle: "do_nothing"
      menu:
        enabled: True
        show_graph: True
        show_graph_grid: True
        graph_history_size: 60
        alignment: "center"
  memory:
    type: "yasb.memory.MemoryWidget"
    options:
      label: "{virtual_mem_used}"
      label_alt: "{virtual_mem_percent}%"
      update_interval: 1000
      progress_bar: 
        enabled: True
        position: 'left'
        size: 24
        thickness: 10
        color: '#d2e5f4'
        animation: True
      callbacks:
        on_left: "toggle_menu"
        on_middle: "toggle_label"
        on_right: "do_nothing"
      menu:
        enabled: True
        show_graph: True
        show_graph_grid: True
        graph_history_size: 60
        alignment: "center"
  traffic:
    type: "yasb.traffic.TrafficWidget"
    options:
      label: "<span>\udb82\udcfa</span> {download_speed}"  
      label_alt: "<span>\udb82\udcfa</span> {download_speed}"   
      update_interval: 3000
      speed_unit: "bytes"
    callbacks:
      on_left: "toggle_menu" # callbacks are not working (win 11)
      on_middle: "do_nothing"
      on_right: "toggle_menu"
  media:
    type: "yasb.media.MediaWidget"
    options:
      label: "{title} - {artist}"
      label_alt: "{title}"
      hide_empty: False
      callbacks:
        on_left: "toggle_media_menu"
        on_middle: "toggle_label"
        on_right: "toggle_play_pause"
      max_field_size:
        label: 15
        label_alt: 15
      show_thumbnail: True
      controls_hide: True
      thumbnail_alpha: 100
      thumbnail_edge_fade: True
      media_menu:
        blur: True
        round_corners: True
        round_corners_type: "normal"
        border_color: "system"
        alignment: "right"
        direction: "down"
        offset_top: 6
        offset_left: 0
        thumbnail_size: 120
        max_title_size: 60
        max_artist_size: 20
        show_source: True
        show_volume_slider: True
      media_menu_icons:
        play: "\udb81\udc0a"
        pause: "\udb80\udfe4"
        prev_track: "\ueb6f"
        next_track: "\ueb70"
      scrolling_label:
        enabled: True
        update_interval_ms: 33
        style: "left"
        separator: " \u2022 "
      progress_bar:
        enabled: True
        alignment: "bottom"
  windows_workspaces:
    type: "yasb.windows_desktops.WorkspaceWidget"
    options:
      label_workspace_btn: "\u2022"
      label_workspace_active_btn: "\uebb4"
  clock:
    type: "yasb.clock.ClockWidget"
    options:
      label: "{%H:%M \u2022 %a, %d/%m}"
      label_alt: "{%I:%M \u2022 %a, %m/%d}"
      locale: "us"
      update_interval: 1000
      calendar: 
        blur: True
        round_corners: True
        round_corners_type: "normal"
        border_color: "System"
        alignment: "center"
        direction: "down"
        show_holidays: True
        country_code: "US"
        holiday_color: "#FF6464"
      callbacks:
        on_left: "toggle_calendar"
        on_right: "toggle_label"
  screenshot:
    type: "yasb.custom.CustomWidget"
    options:
      label: "\uf50c"
      label_alt: ""
      class_name: "screenshot-widget"
      callbacks:
        on_left: "exec cmd /c powershell -c Add-Type -AssemblyName System.Windows.Forms; [System.Windows.Forms.SendKeys]::SendWait('{PRTSC}');"
  showkeyboard:
    type: "yasb.custom.CustomWidget"
    options:
      label: "\uf11c"
      label_alt: ""
      class_name: "showkeyboard-widget"
      callbacks:
        on_left: "exec cmd /c osk"
  brightness:
    type: "yasb.brightness.BrightnessWidget"
    options:
      label: ""
      label_alt: ""
      tooltip: True
      progress_bar:
        enabled: True
        position: 'left'
        size: 24
        thickness: 10
        color: '#d2e5f4'
        animation: True
      brightness_menu:
        blur: True
        round_corners: True
        round_corners_type: "normal"
        border_color: "system"
        alignment: "center"
        direction: "down"
        brightness_icon: "\ue30d"
        contrast_icon: "\uf042"
      callbacks:
          on_left: "toggle_brightness_menu"
  battery:
    type: "yasb.battery.BatteryWidget"
    options:
      label: "{percent}"
      label_alt: ""
      update_interval: 5000
      time_remaining_natural: False
      hide_unsupported: True
      charging_options:
        icon_format: "{charging_icon}"
        blink_charging_icon: True
        blink_interval: 500
      status_thresholds:
        critical: 10
        low: 25
        medium: 75
        high: 95
        full: 100
      status_icons:
        icon_charging: "\uf0e7"
        icon_critical: "\uf244"
        icon_low: "\uf243"
        icon_medium: "\uf242"
        icon_high: "\uf241"
        icon_full: "\uf240"
      callbacks:
        on_left: "do_nothing"
        on_middle: "do_nothing"
        on_right: "do_nothing"
  open_meteo:
    type: "yasb.open_meteo.OpenMeteoWidget"
    options:
      label: "<span>{icon}</span> {temp}"
      tooltip: True
      update_interval: 600
      hide_decimal: True
      units: "metric"
      callbacks:
        on_left: "toggle_card"
        on_middle: "do_nothing"
        on_right: "do_nothing"
      icons:
        sunnyDay: "\ue30d"
        clearNight: "\ue32b"
        cloudyDay: "\ue302"
        cloudyNight: "\udb83\udf31"
        drizzleDay: "\udb81\ude7e"
        drizzleNight: "\udb81\ude7e"
        rainyDay: "\ue308"
        rainyNight: "\ue325"
        snowyDay: "\ue30a"
        snowyNight: "\ue327"
        foggyDay: "\ue303"
        foggyNight: "\ue346"
        thunderstormDay: "\ue30f"
        thunderstormNight: "\ue338"
        default: "\ue350"
      weather_card:
        blur: True
        round_corners: True
        round_corners_type: "normal"
        border_color: "system"
        alignment: "right"
        direction: "down"
        icon_size: 64
        show_hourly_forecast: True
        time_format: "24h"
        hourly_point_spacing: 76
        hourly_icon_size: 32
        icon_smoothing: True
        temp_line_width: 2
        current_line_color: "#8EAEE8"
        current_line_width: 1 
        current_line_style: "dot"
        hourly_gradient:
          enabled: True
          top_color: "#8EAEE8"
          bottom_color: "#2A3E68"
        hourly_forecast_buttons:
          enabled: True
          temperature_icon: "\udb81\udd04" # or \udb81\udd05
          rain_icon: "\uef1c"
          snow_icon: "\udb81\udf17"
        weather_animation:
          enabled: True
          snow_overrides_rain: True
          temp_line_animation_style: both # can be "rain", "snow", "both", or "none"
          rain_effect_intensity: 1.0 # 0.01 - 10.0
          snow_effect_intensity: 1.0 # 0.01 - 10.0
          scale_with_chance: True
  language:
    type: "yasb.language.LanguageWidget"
    options:
      label: "{lang[country_code]}"
      label_alt: "{lang[full_name]}"
      update_interval: 1
      callbacks:
        on_left: "toggle_menu"
        on_middle: "do_nothing"
        on_right: "do_nothing"
      language_menu:
        blur: True
        round_corners: True
        round_corners_type: "normal"
        border_color: "system"
        alignment: "right"
        direction: "down"
        offset_top: 6
        offset_left: 0
        show_layout_icon: True
        layout_icon: "\uf11c"
  dotseparator:
    type: "yasb.custom.CustomWidget"
    options:
      label: "\u2022"
      label_alt: ""
      class_name: "dotseparator-widget"
      callbacks:
        on_left: "do_nothing"
        on_middle: "do_nothing"
        on_right: "do_nothing"
  notifications:
    type: "yasb.notifications.NotificationsWidget"
    options:
      label: "<span>\uf476</span> {count}"
      label_alt: "{count} notifications"
      hide_empty: False
      tooltip: False
      callbacks:
        on_left: "toggle_notification"
        on_right: "do_nothing"
        on_middle: "toggle_notification"
  wifi:
   type: "yasb.wifi.WifiWidget"
   options:
     label: "<span>{wifi_icon}</span>"
     label_alt: "{wifi_name} {wifi_strength}%"
     update_interval: 5000
     callbacks:
       on_left: "exec cmd.exe /c explorer.exe ms-actioncenter:controlcenter/true"
       on_middle: "exec cmd.exe /c start ms-settings:network"
       on_right: "toggle_menu"
     ethernet_label: "<span>{wifi_icon}</span>"
     ethernet_label_alt: "<span>{wifi_icon}</span>{ip_addr}"
     ethernet_icon: "\udb80\ude00"
     get_exact_wifi_strength: False  # Optional. Will require location access permission if True.
     wifi_icons: [
       "\udb82\udd2e",  # Icon for 0% strength
       "\udb82\udd1f",  # Icon for 1-24% strength
       "\udb82\udd22",  # Icon for 25-49% strength
       "\udb82\udd25",  # Icon for 50-74% strength
       "\udb82\udd28"   # Icon for 75-100% strength
     ]
     menu_config:
       blur: True
       round_corners: True
       round_corners_type: "normal"
       border_color: "System"
       alignment: "right"
       direction: "down"
       offset_top: 6
       offset_left: 0
       wifi_icons_secured: [
         "\ue670",
         "\ue671",
         "\ue672",
         "\ue673",
       ]
       wifi_icons_unsecured: [
         "\uec3c",
         "\uec3d",
         "\uec3e",
         "\uec3f",
        ]
  bluetooth:
   type: "yasb.bluetooth.BluetoothWidget"
   options:
     label: "<span>{icon}</span>"
     label_alt: "{device_name}"
     label_no_device: "No devices"
     label_device_separator: ", "
     max_length: 10
     max_length_ellipsis: ""
     icons: 
       bluetooth_on: "\udb80\udcaf"
       bluetooth_off: "\udb80\udcb2"
       bluetooth_connected: "\udb80\udcb1"
     device_aliases:
       - name: "T5.0"
         alias: "\uf025"
     callbacks:
       on_left: "exec cmd.exe /c explorer.exe ms-actioncenter:controlcenter/true"
       on_middle: "toggle_label"
       on_right: "exec cmd.exe /c start ms-settings:bluetooth"
  taskbar:
    type: "yasb.taskbar.TaskbarWidget"
    options:
      icon_size: 16
      tooltip: True
      show_only_visible: False
      strict_filtering: False
      hide_empty: True
      animation:
        enabled: True
        duration: 25
      ignore_apps:
        processes: []
        titles: []
        classes: []
  power_menu:
    type: "yasb.power_menu.PowerMenuWidget"
    options:
      label: "<span>\uf51b</span>"
      uptime: False
      show_user: False
      blur: False
      blur_background: True
      animation_duration: 120
      button_row: 4
      buttons:
        lock: ["\udb80\udf41", "Lock"]
        sleep: ["\ue32b", "Sleep"]
        signout: ["\udb81\uddfd", "Sign out"]
        force_restart: ["\udb84\udd0c", "Force Reboot"]
        hibernate: ["\uf28e", "Hibernate"]
        shutdown: ["\uf011", "Shut Down"]
        restart: ["\uead2", "Reboot"]
        cancel: ["\udb81\udf3a", "Cancel"]
  wallpapers:
    type: "yasb.wallpapers.WallpapersWidget"
    options:
      label: ""
      image_path: "C:\\Users\\Shaw\\Pictures"
      engine:
        enabled: True
        animation: "circle"
      gallery:
        enabled: True
        blur: False
        image_width: 400
        image_per_page: 3
        gallery_columns: 1
        horizontal_position: "center"
        vertical_position: "center"
        respect_work_area: True
        show_buttons: False
        orientation: "landscape"
        image_spacing: 8
        lazy_load: True
        lazy_load_fadein: 400
        image_corner_radius: 22
      callbacks:
        on_left: "do_nothing"
        on_middle: "do_nothing"
        on_right: "do_nothing"
      keybindings:
        - keys: "ctrl+shift+w"
          action: "toggle_gallery"
